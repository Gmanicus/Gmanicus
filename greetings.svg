<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes move {
					0% {
						transform: translate(0, -50%);
					}
					50% {
						transform: translate(0, 50%);
                    }
                    100% {
						transform: translate(0, -50%);
					}
				}
				@keyframes gradientBackground {
					0% {
						background-position: 0% 50%;
					}
					50% {
						background-position: 100% 50%;
					}
					100% {
						background-position: 0% 50%;
					}
				}
				@keyframes fadeInOut {
					0% {
						opacity: 0;
                    }
                    33% {
						opacity: 0;
					}
					100% {
						opacity: 1;
					}
				}
				.container {
					font-family:
						system-ui,
						-apple-system,
						'Segoe UI',
						Roboto,
						Helvetica,
						Arial,
						sans-serif,
						'Apple Color Emoji',
						'Segoe UI Emoji';
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					margin: 0;
					width: 100%;
					height: 400px;
                    background-color: gray;
					border-radius: 10px;
					color: white;
					text-align: center;
				}
				#one, #two, #three {
					font-size: 50px;
					line-height: 1.3;
					letter-spacing: 5px;
					text-transform: uppercase;
					text-shadow:
						0 1px 0 #efefef,
						0 2px 0 #efefef,
						0 3px 0 #efefef,
						0 4px 0 #efefef,
                        0 12px 5px rgba(0, 0, 0, 0.1);
                    opacity: 0;
				} #one {
                    animation: 1s ease 0s normal forwards 1 fadeInOut;
                } #two {
                    animation: 5s ease 5s normal forwards 1 fadeInOut;
                } #three {
                    animation: 5s ease 10s normal forwards 1 fadeInOut;
                }
				p {
					font-size: 20px;
					text-shadow: 0 1px 0 #efefef;
					animation: 5s ease 0s normal forwards 1 fadeInOut;
				}
			</style>
			<div class="container">
                <h1 id="one">My name is Grant</h1>
                <h1 id="two">Testing 1 2 3</h1>
                <h1 id="three">Beep Boop Bop</h1>
			</div>
		</div>
	</foreignObject>
</svg>
